<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard — Encuesta MSoluciones</title>
<style>
  :root{
    --verde-oscuro:#1f5c3a;
    --verde:#2f8557;
    --verde-claro:#e6f2ea;
    --ambar:#e0a437;
    --rojo:#d1554a;
    --gris-900:#1c2422;
    --gris-600:#5b6a64;
    --gris-300:#dfe6e2;
    --gris-100:#f5f8f6;
    --white:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--gris-100);
    font-family:'Segoe UI', -apple-system, Roboto, sans-serif;
    color:var(--gris-900);padding:28px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  .topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap;gap:14px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--verde),var(--verde-oscuro));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:15px;}
  .brand-text h1{margin:0;font-size:19px;letter-spacing:-0.01em;}
  .brand-text p{margin:2px 0 0;font-size:12.5px;color:var(--gris-600);}
  .period{font-size:12px;color:var(--gris-600);background:var(--white);border:1px solid var(--gris-300);padding:7px 12px;border-radius:8px;display:flex;align-items:center;gap:8px;}
  .refresh-btn{background:var(--verde);color:white;border:none;border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .refresh-btn:hover{background:var(--verde-oscuro);}

  .filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--white);border:1px solid var(--gris-300);border-radius:12px;padding:12px 16px;margin-bottom:18px;}
  .filters .label{font-size:12px;font-weight:600;color:var(--gris-600);text-transform:uppercase;letter-spacing:.04em;margin-right:4px;}
  .chip-group{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{padding:6px 13px;border-radius:999px;font-size:12.5px;border:1px solid var(--gris-300);background:var(--gris-100);color:var(--gris-600);cursor:pointer;transition:.15s;}
  .chip:hover{border-color:var(--verde);}
  .chip.active{background:var(--verde);border-color:var(--verde);color:white;font-weight:600;}
  select{padding:6px 12px;border-radius:8px;border:1px solid var(--gris-300);background:var(--white);font-size:12.5px;color:var(--gris-900);max-width:220px;}
  .clear-btn{font-size:12px;color:var(--verde-oscuro);background:none;border:none;cursor:pointer;text-decoration:underline;margin-left:auto;}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi{background:var(--white);border:1px solid var(--gris-300);border-radius:14px;padding:16px 18px;}
  .kpi .lbl{font-size:12px;color:var(--gris-600);font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .kpi .val{font-size:30px;font-weight:700;margin-top:6px;letter-spacing:-0.02em;color:var(--verde-oscuro);}
  .kpi .sub{font-size:12px;color:var(--gris-600);margin-top:4px;}

  .grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:14px;}
  .grid2b{display:grid;grid-template-columns:0.8fr 1.2fr;gap:14px;margin-bottom:14px;}

  .card{background:var(--white);border:1px solid var(--gris-300);border-radius:14px;padding:18px 20px;}
  .card h3{margin:0 0 3px;font-size:14px;}
  .card .desc{font-size:11.5px;color:var(--gris-600);margin-bottom:14px;}

  .bars{display:flex;align-items:flex-end;gap:18px;height:150px;padding-top:10px;}
  .bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end;}
  .bar{width:100%;max-width:46px;border-radius:6px 6px 0 0;background:var(--verde);position:relative;transition:height .25s ease;}
  .bar span{position:absolute;top:-20px;left:0;right:0;text-align:center;font-size:12px;font-weight:700;color:var(--gris-900);}
  .bar-col .name{font-size:10.5px;color:var(--gris-600);margin-top:8px;text-align:center;line-height:1.3;}

  .donut-wrap{display:flex;align-items:center;gap:20px;}
  .donut{width:120px;height:120px;border-radius:50%;flex-shrink:0;position:relative;transition:background .25s ease;}
  .donut::after{content:"";position:absolute;inset:18px;background:var(--white);border-radius:50%;}
  .donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;}
  .donut-center b{font-size:19px;}
  .donut-center small{font-size:9.5px;color:var(--gris-600);}
  .legend{display:flex;flex-direction:column;gap:8px;font-size:12.5px;}
  .legend div{display:flex;align-items:center;gap:7px;}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  .mapa-chile{display:flex;flex-direction:column;gap:2px;}
  .mapa-row{display:grid;grid-template-columns:1fr 30px;align-items:center;gap:8px;}
  .mapa-stripe{height:15px;border-radius:3px;display:flex;align-items:center;padding-left:8px;font-size:9.5px;color:white;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mapa-stripe.sin-datos{background:var(--gris-300)!important;color:var(--gris-600);}
  .mapa-val{font-size:11px;font-weight:700;text-align:right;color:var(--gris-900);}

  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px;}
  th{text-align:left;color:var(--gris-600);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding:8px 6px;border-bottom:1px solid var(--gris-300);position:sticky;top:0;background:var(--white);}
  td{padding:9px 6px;border-bottom:1px solid var(--gris-100);}
  .tag{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600;}
  .tag.convenio{background:var(--verde-claro);color:var(--verde-oscuro);}
  .tag.terreno{background:#fdf1e4;color:#a5691a;}
  .tag.otro{background:var(--gris-100);color:var(--gris-600);}
  .scroll-table{max-height:280px;overflow-y:auto;}
  .promedio-pill{font-weight:700;padding:2px 8px;border-radius:6px;font-size:11.5px;color:white;display:inline-block;}

  .foot{margin-top:18px;font-size:11px;color:var(--gris-600);text-align:center;}
  .msg{padding:40px;text-align:center;color:var(--gris-600);font-size:13px;}
  .err{color:var(--rojo);}
  .full{grid-column:1/-1;}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">MS</div>
      <div class="brand-text">
        <h1>Encuesta de Satisfacción — Convenios y Terreno</h1>
        <p>Dashboard interno — filtros instantáneos, sin recargar</p>
      </div>
    </div>
    <div class="period">
      <span id="ultima-act">Cargando…</span>
      <span id="velocidad" style="color:var(--verde);font-weight:600;"></span>
      <button class="refresh-btn" onclick="cargarDatos()">Actualizar</button>
    </div>
  </div>

  <div class="filters">
    <span class="label">Tipo</span>
    <div class="chip-group" id="chips-tipo">
      <span class="chip active" data-tipo="">Todos</span>
      <span class="chip" data-tipo="convenio">Convenio</span>
      <span class="chip" data-tipo="terreno">Terreno</span>
    </div>
    <span class="label" style="margin-left:14px;">Región</span>
    <select id="select-region"><option value="">Todas las regiones</option></select>
    <span class="label" style="margin-left:14px;">Hospital / Centro</span>
    <select id="select-empresa"><option value="">Todas</option></select>
    <button class="clear-btn" onclick="limpiarFiltros()">Limpiar filtros</button>
  </div>

  <div id="contenido">
    <div class="msg">Cargando datos…</div>
  </div>

  <div class="foot">Dashboard de uso interno — incluye desglose por Hospital/Costo</div>
</div>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyzfIWTmXC_dPx73yR0iT2bLDqncfy1mmwQHxZF7rJ2uhhGai6cPj1vq2MFOfVXiX6O/exec";

const REGIONES_ORDEN = [
  "Arica y Parinacota","Tarapacá","Antofagasta","Atacama","Coquimbo",
  "Valparaíso","Metropolitana de Santiago",
  "Libertador General Bernardo O'Higgins","Maule","Ñuble","Biobío",
  "La Araucanía","Los Ríos","Los Lagos",
  "Aysén del General Carlos Ibáñez del Campo",
  "Magallanes y de la Antártica Chilena"
];

let todasLasRespuestas = [];
let ultimaActualizacion = null;
let filtroTipo = "";
let filtroRegion = "";
let filtroEmpresa = "";
let opcionesCargadas = false;

function tagClase(tipo){
  const t = (tipo||"").toLowerCase();
  if (t === "convenio") return "convenio";
  if (t === "terreno") return "terreno";
  return "otro";
}

function colorPorPromedio(p){
  if (p >= 4.5) return "var(--verde-oscuro)";
  if (p >= 3.5) return "var(--verde)";
  if (p >= 2.5) return "var(--ambar)";
  return "var(--rojo)";
}

function poblarSelect(id, valores, placeholder){
  const sel = document.getElementById(id);
  sel.innerHTML = `<option value="">${placeholder}</option>` +
    [...new Set(valores)].sort((a,b)=>a.localeCompare(b,'es')).map(v => `<option value="${v}">${v}</option>`).join('');
}


function agregar(rows){
  const total = rows.length;
  let sumQ1=0,sumQ2=0,sumQ3=0,sumQ4=0;
  let promotores=0,pasivos=0,detractores=0;
  const regionMap={}, tipoMap={}, empresaMap={};

  rows.forEach(r=>{
    sumQ1+=r.q1; sumQ2+=r.q2; sumQ3+=r.q3; sumQ4+=r.q4;
    const nps = r.nps;
    if (!isNaN(nps)) {
      if (nps>=9) promotores++;
      else if (nps>=7) pasivos++;
      else detractores++;
    }
    [[regionMap, r.region],[tipoMap, r.tipo],[empresaMap, r.empresa]].forEach(([map,key])=>{
      if(!map[key]) map[key]={total:0,sumProm:0,sumNps:0,countNps:0};
      const m = map[key];
      m.total++;
      m.sumProm += (r.q1+r.q2+r.q3+r.q4)/4;
      if(!isNaN(nps)){ m.sumNps+=nps; m.countNps++; }
    });
  });

  const promedioGeneral = total ? (sumQ1+sumQ2+sumQ3+sumQ4)/(4*total) : 0;
  const npsScore = total ? Math.round(((promotores-detractores)/total)*100) : 0;

  function mapToArray(map,keyName){
    return Object.keys(map).map(k=>{
      const m = map[k];
      const obj = {};
      obj[keyName]=k;
      obj.totalRespuestas = m.total;
      obj.promedio = Number((m.sumProm/m.total).toFixed(2));
      obj.nps = m.countNps ? Math.round((m.sumNps/m.countNps)*10)/10 : null;
      return obj;
    });
  }

  return {
    totalRespuestas: total,
    promedioGeneral: Number(promedioGeneral.toFixed(2)),
    promedioPorPregunta: {
      q1: total ? Number((sumQ1/total).toFixed(2)) : 0,
      q2: total ? Number((sumQ2/total).toFixed(2)) : 0,
      q3: total ? Number((sumQ3/total).toFixed(2)) : 0,
      q4: total ? Number((sumQ4/total).toFixed(2)) : 0
    },
    nps: { score: npsScore, promotores, pasivos, detractores },
    porRegion: mapToArray(regionMap,"region"),
    porTipo: mapToArray(tipoMap,"tipo"),
    porEmpresa: mapToArray(empresaMap,"empresa")
  };
}

function limpiarFiltros(){
  filtroTipo = ""; filtroRegion = ""; filtroEmpresa = "";
  document.querySelectorAll('#chips-tipo .chip').forEach(c => c.classList.toggle('active', c.dataset.tipo === ""));
  document.getElementById('select-region').value = "";
  document.getElementById('select-empresa').value = "";
  aplicarFiltros();
}

// Filtra el arreglo que ya tenemos en memoria y vuelve a dibujar —
// no llama a internet, por eso es instantáneo.
function aplicarFiltros(){
  const inicio = performance.now();
  let filtradas = todasLasRespuestas;
  if (filtroTipo) filtradas = filtradas.filter(r => (r.tipo||"").toLowerCase().trim() === filtroTipo);
  if (filtroRegion) filtradas = filtradas.filter(r => r.region === filtroRegion);
  if (filtroEmpresa) filtradas = filtradas.filter(r => r.empresa === filtroEmpresa);
  render(agregar(filtradas));
  const ms = Math.round(performance.now() - inicio);
  document.getElementById('velocidad').textContent = `filtrado en ${ms} ms`;
}

function render(data){
  const total = data.totalRespuestas || 0;
  const promotores = data.nps.promotores || 0;
  const pasivos = data.nps.pasivos || 0;
  const detractores = data.nps.detractores || 0;
  const totalNps = promotores + pasivos + detractores;
  const pctProm = totalNps ? (promotores/totalNps*100) : 0;
  const pctPas = totalNps ? (pasivos/totalNps*100) : 0;
  const pctRecomienda = total ? Math.round((promotores/total)*100) : 0;
  const gradPromEnd = pctProm;
  const gradPasEnd = pctProm + pctPas;
  const maxQ = Math.max(data.promedioPorPregunta.q1, data.promedioPorPregunta.q2, data.promedioPorPregunta.q3, data.promedioPorPregunta.q4, 1);

  const mapaHtml = REGIONES_ORDEN.map(nombreRegion => {
    const match = data.porRegion.find(r => r.region === nombreRegion);
    if (!match) {
      return `<div class="mapa-row"><div class="mapa-stripe sin-datos">${nombreRegion}</div><span class="mapa-val">—</span></div>`;
    }
    return `<div class="mapa-row"><div class="mapa-stripe" style="background:${colorPorPromedio(match.promedio)};">${nombreRegion}</div><span class="mapa-val">${match.promedio}</span></div>`;
  }).join('');

  const empresasOrdenadas = [...data.porEmpresa].sort((a,b)=>a.promedio-b.promedio);

  if (total === 0){
    document.getElementById('contenido').innerHTML = '<div class="msg">No hay respuestas para esta combinación de filtros.</div>';
    return;
  }

  document.getElementById('contenido').innerHTML = `
    <div class="kpis">
      <div class="kpi"><div class="lbl">Total Respuestas</div><div class="val">${total}</div><div class="sub">según filtros actuales</div></div>
      <div class="kpi"><div class="lbl">Promedio General</div><div class="val">${data.promedioGeneral} <span style="font-size:14px;color:var(--gris-600);">/5</span></div><div class="sub">Q1 a Q4</div></div>
      <div class="kpi"><div class="lbl">NPS</div><div class="val">${data.nps.score}</div><div class="sub">${detractores} detractores, ${promotores} promotores</div></div>
      <div class="kpi"><div class="lbl">% Recomendación (9–10)</div><div class="val">${pctRecomienda}%</div><div class="sub">${promotores} de ${total} respuestas</div></div>
    </div>

    <div class="grid2">
      <div class="card">
        <h3>Promedio por pregunta</h3>
        <div class="desc">Escala 1 a 5</div>
        <div class="bars">
          <div class="bar-col"><div class="bar" style="height:${(data.promedioPorPregunta.q1/maxQ*100)}%;"><span>${data.promedioPorPregunta.q1}</span></div><div class="name">Q1 Servicio<br>Entregado</div></div>
          <div class="bar-col"><div class="bar" style="height:${(data.promedioPorPregunta.q2/maxQ*100)}%;"><span>${data.promedioPorPregunta.q2}</span></div><div class="name">Q2 Resolución<br>Problema</div></div>
          <div class="bar-col"><div class="bar" style="height:${(data.promedioPorPregunta.q3/maxQ*100)}%;"><span>${data.promedioPorPregunta.q3}</span></div><div class="name">Q3 Entrega</div></div>
          <div class="bar-col"><div class="bar" style="height:${(data.promedioPorPregunta.q4/maxQ*100)}%;"><span>${data.promedioPorPregunta.q4}</span></div><div class="name">Q4 Profesio-<br>nalismo</div></div>
        </div>
      </div>

      <div class="card">
        <h3>Distribución NPS</h3>
        <div class="desc">Promotores / Pasivos / Detractores</div>
        <div class="donut-wrap">
          <div class="donut" style="background:conic-gradient(var(--verde) 0% ${gradPromEnd}%, var(--ambar) ${gradPromEnd}% ${gradPasEnd}%, var(--rojo) ${gradPasEnd}% 100%);">
            <div class="donut-center"><b>${data.nps.score}</b><small>NPS</small></div>
          </div>
          <div class="legend">
            <div><span class="dot" style="background:var(--verde);"></span> Promotores — ${promotores}</div>
            <div><span class="dot" style="background:var(--ambar);"></span> Pasivos — ${pasivos}</div>
            <div><span class="dot" style="background:var(--rojo);"></span> Detractores — ${detractores}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="grid2b">
      <div class="card">
        <h3>Mapa por Región (esquemático)</h3>
        <div class="desc">Norte → Sur.</div>
        <div class="mapa-chile">${mapaHtml}</div>
      </div>

      <div class="card">
        <h3>Por Hospital / Centro</h3>
        <div class="desc">Ordenado de menor a mayor promedio — para detectar oportunidades de mejora primero</div>
        <div class="scroll-table">
          <table>
            <tr><th>Centro</th><th>Respuestas</th><th>Promedio</th><th>NPS</th></tr>
            ${empresasOrdenadas.map(e => `
              <tr>
                <td>${e.empresa}</td>
                <td>${e.totalRespuestas}</td>
                <td><span class="promedio-pill" style="background:${colorPorPromedio(e.promedio)};">${e.promedio}</span></td>
                <td>${e.nps !== null ? e.nps : '—'}</td>
              </tr>
            `).join('')}
          </table>
        </div>
      </div>
    </div>

    <div class="card full" style="margin-top:14px;">
      <h3>Por Tipo de Servicio</h3>
      <div class="desc">Convenio vs Terreno</div>
      <table>
        <tr><th>Tipo</th><th>Respuestas</th><th>Promedio</th><th>NPS</th></tr>
        ${data.porTipo.map(t => `
          <tr>
            <td><span class="tag ${tagClase(t.tipo)}">${t.tipo}</span></td>
            <td>${t.totalRespuestas}</td>
            <td>${t.promedio}</td>
            <td>${t.nps !== null ? t.nps : '—'}</td>
          </tr>
        `).join('')}
      </table>
    </div>
  `;
}

async function cargarDatos(){
  document.getElementById('contenido').innerHTML = '<div class="msg">Conectando con Google Sheets… esto puede tardar unos segundos.</div>';
  document.getElementById('velocidad').textContent = '';
  try {
    const resp = await fetch(URL_SCRIPT);
    if (!resp.ok) throw new Error("Respuesta no válida del servidor (" + resp.status + ")");
    const json = await resp.json();
    todasLasRespuestas = json.respuestas || [];
    ultimaActualizacion = json.ultimaActualizacion;
    document.getElementById('ultima-act').textContent = "Actualizado: " + new Date(ultimaActualizacion).toLocaleString('es-CL');

    if (!opcionesCargadas){
      poblarSelect('select-region', todasLasRespuestas.map(r=>r.region), "Todas las regiones");
      poblarSelect('select-empresa', todasLasRespuestas.map(r=>r.empresa), "Todas");
      opcionesCargadas = true;
    }

    aplicarFiltros();
  } catch (err) {
    document.getElementById('contenido').innerHTML =
      '<div class="msg err">No se pudieron cargar los datos.<br>' + err.message + '</div>';
  }
}

document.getElementById('chips-tipo').addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  filtroTipo = chip.dataset.tipo;
  document.querySelectorAll('#chips-tipo .chip').forEach(c => c.classList.toggle('active', c === chip));
  aplicarFiltros();
});
document.getElementById('select-region').addEventListener('change', (e) => {
  filtroRegion = e.target.value;
  aplicarFiltros();
});
document.getElementById('select-empresa').addEventListener('change', (e) => {
  filtroEmpresa = e.target.value;
  aplicarFiltros();
});

cargarDatos();
</script>
</body>
</html>
